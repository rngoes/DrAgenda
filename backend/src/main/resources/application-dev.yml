spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dragenda_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

admin:
  seed:
    password: ${ADMIN_SEED_PASSWORD:admin123@Dev}  # default apenas para dev local

logging:
  level:
    com.dragenda: DEBUG
    org.springframework.security: DEBUG
