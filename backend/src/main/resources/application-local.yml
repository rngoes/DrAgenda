spring:
  datasource:
    url: jdbc:h2:file:./data/dragenda_local;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: true
      path: /h2-console

admin:
  seed:
    password: ${ADMIN_SEED_PASSWORD:admin123@Dev}

logging:
  level:
    com.dragenda: DEBUG
    org.springframework.security: INFO
