spring:
  application:
    name: dragenda-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    validate-on-migrate: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    user:
      name: disabled  # Spring Security default user desabilitado — JWT gerencia auth

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

encryption:
  key: ${ENCRYPTION_KEY}

admin:
  seed:
    password: ${ADMIN_SEED_PASSWORD}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
